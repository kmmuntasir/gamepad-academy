<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submarine Sonar — Gamepad Academy</title>
    <link rel="stylesheet" href="../../shared/styles.css" />
    <link rel="stylesheet" href="../../shared/retro.css" />
    <style>
      /* Game-local layout. Global look comes from shared/styles.css. */
      .submarine-page {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        max-width: 1100px;
        width: 100%;
        margin: 0 auto;
        padding: var(--space-2) var(--space-4);
        gap: var(--space-2);
      }
      .submarine-page__title {
        text-align: center;
        margin: 0;
      }
      .submarine-stage {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        max-height: min(72vh, calc((100vw - 4rem) * 10 / 16));
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-md);
        background: #02060f; /* inky deep water; the canvas draws the rest */
      }
      .submarine-stage canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      .submarine-instructions {
        margin: 0;
        padding: var(--space-1) var(--space-3);
        background-color: var(--c-surface);
        border-radius: var(--radius-md);
        color: var(--c-muted);
        font-size: var(--fs-sm);
        text-align: center;
      }
      .submarine-instructions__compact {
        display: inline-flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: var(--space-2);
      }
      .submarine-instructions__compact strong {
        color: var(--c-text);
      }
      .headlight-readout {
        display: inline-flex;
        align-items: center;
        gap: var(--space-1);
        font-size: var(--fs-sm);
        color: var(--c-muted);
        margin: 0;
      }
      .headlight-readout__swatch {
        display: inline-block;
        width: 0.9em;
        height: 0.9em;
        border-radius: 50%;
        vertical-align: middle;
        border: 1px solid rgba(255, 255, 255, 0.35);
      }
      .discovery-hud {
        margin: 0;
        padding: var(--space-1) var(--space-3);
        background-color: var(--c-surface);
        border-radius: var(--radius-md);
        color: var(--c-text);
        font-size: var(--fs-md);
        text-align: center;
      }
      .discovery-hud strong {
        color: var(--c-accent, #ffd23f);
      }
      @media (prefers-reduced-motion: reduce) {
        .submarine-stage,
        .headlight-readout__swatch {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="back-home-row">
      <a class="back-home" href="../../index.html">← Back to Home</a>
    </div>

    <div
      class="gamepad-banner"
      id="banner"
      role="status"
      aria-live="polite"
    >
      <span class="gamepad-banner__dot" aria-hidden="true"></span>
      <span class="gamepad-banner__text" id="banner-text">Waiting for a controller…</span>
    </div>

    <main class="page submarine-page">
      <h1 class="submarine-page__title">Submarine Sonar</h1>

      <div class="submarine-stage">
        <canvas id="game" aria-label="Submarine sonar playfield"></canvas>
      </div>

      <p class="discovery-hud" role="status" aria-live="polite">
        Creatures discovered: <strong id="discovered-count">0</strong> /
        <span id="discovered-total">16</span>
      </p>

      <section class="submarine-instructions" aria-label="Controls">
        <div class="submarine-instructions__compact">
          <span><strong>L-stick</strong> move</span>
          <span>·</span>
          <span><strong id="ping-prompt">L3</strong> ping</span>
          <span>·</span>
          <span><strong id="color-prompt">R3</strong> headlight</span>
          <span>·</span>
          <span><strong>D-Pad</strong> nudge</span>
          <span>·</span>
          <span class="headlight-readout">
            <span
              class="headlight-readout__swatch"
              id="headlight-swatch"
              aria-hidden="true"
            ></span>
          </span>
        </div>
      </section>
    </main>

    <script type="module" src="./game.js"></script>
  </body>
</html>
